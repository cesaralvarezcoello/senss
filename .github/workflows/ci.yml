name: CI

# Resuelve dependencias (genera pubspec.lock), analiza y ejecuta los tests.
# El pubspec.lock resultante se publica como artefacto descargable, para
# obtener las versiones exactas sin instalar Flutter localmente.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch: # permite lanzarlo a mano desde la pestaña Actions

jobs:
  test:
    name: pub get + tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Para builds reproducibles, fija una versión concreta en vez del
          # canal, p. ej.:  flutter-version: '3.24.5'
          cache: true

      - name: Versión de Flutter/Dart
        run: flutter --version

      - name: Instalar dependencias (genera pubspec.lock)
        run: flutter pub get

      # Se sube siempre, incluso si un paso posterior falla, para poder
      # inspeccionar/descargar las versiones resueltas.
      - name: Publicar pubspec.lock como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pubspec-lock
          path: pubspec.lock
          if-no-files-found: warn

      # No bloquea la CI: reporta problemas de análisis pero deja correr los
      # tests. Quita `continue-on-error` cuando el análisis esté limpio.
      - name: Analizar (flutter analyze)
        run: flutter analyze
        continue-on-error: true

      - name: Ejecutar tests
        run: flutter test --reporter expanded

  build-android:
    name: Build Android (APK debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # La carpeta android/ no se versiona (ver README §2). Se genera en un
      # proyecto temporal y se mueve, para no tocar lib/ ni pubspec.yaml.
      - name: Generar la carpeta android/
        run: |
          flutter create --project-name senss --org com.senss --platforms=android _scaffold
          mv _scaffold/android ./android
          rm -rf _scaffold

      # Permisos de runtime (README §4). Necesarios para grabar audio y usar la
      # cámara en el dispositivo. Se inyectan aquí porque android/ es generado.
      - name: Inyectar permisos de micrófono y cámara
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          grep -q "android.permission.RECORD_AUDIO" "$MANIFEST" || \
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.CAMERA"/>' "$MANIFEST"
          echo "----- AndroidManifest.xml -----"
          cat "$MANIFEST"

      # Algunos plugins (p. ej. tflite_flutter) fijan Java a 1.8 mientras Kotlin
      # usa 17 (JDK del runner); el AGP nuevo lo trata como error. Baja esa
      # validación a warning para todo el proyecto (fix global y sin editar Gradle).
      - name: Ajustes de Gradle (JVM target + compileSdk)
        run: |
          # 1) Plugins con KGP antiguo (Java 1.8 vs Kotlin 17): baja la validación.
          echo "kotlin.jvm.target.validation.mode=warning" >> android/gradle.properties
          # 2) compileSdk >= 36 (lo exige flutter_plugin_android_lifecycle).
          #    a) módulo app: se fija directo (evaluado desde el inicio).
          APP_GRADLE=$(ls android/app/build.gradle android/app/build.gradle.kts 2>/dev/null | head -1)
          sed -i -E 's/compileSdk(Version)?[[:space:]]*=?[[:space:]]*[A-Za-z0-9_.]+/compileSdk = 36/' "$APP_GRADLE"
          #    b) módulos de plugins (file_picker, etc.): se compilan aparte, se
          #       fuerzan desde el build raíz con afterEvaluate (Groovy o Kotlin).
          if [ -f android/build.gradle ]; then
            cat ci/compileSdk-override.gradle >> android/build.gradle
          elif [ -f android/build.gradle.kts ]; then
            cat ci/compileSdk-override.gradle.kts >> android/build.gradle.kts
          fi
          echo "--- compileSdk en $APP_GRADLE ---"
          grep -nE 'compileSdk' "$APP_GRADLE" || true

      - name: Instalar dependencias
        run: flutter pub get

      # Debug evita tener que configurar firma de release en CI.
      - name: Construir APK (debug)
        run: flutter build apk --debug

      - name: Publicar APK como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: warn

  # Comprueba si el keystore de firma está configurado en Secrets, para que el
  # build de release solo se ejecute cuando pueda firmarse (evita fallar en
  # forks/PRs sin secretos). El job de release lo usa vía `needs` + `if`.
  check-signing:
    name: ¿Hay keystore configurado?
    runs-on: ubuntu-latest
    outputs:
      has_keystore: ${{ steps.check.outputs.has }}
    steps:
      - id: check
        run: echo "has=${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}" >> "$GITHUB_OUTPUT"

  build-android-release:
    name: Build Android (APK release firmado)
    runs-on: ubuntu-latest
    needs: check-signing
    if: ${{ needs.check-signing.outputs.has_keystore == 'true' }}

    # Secretos requeridos (Settings > Secrets and variables > Actions):
    #   ANDROID_KEYSTORE_BASE64    -> keystore .jks en base64 (base64 -w0 key.jks)
    #   ANDROID_KEYSTORE_PASSWORD  -> contraseña del almacén
    #   ANDROID_KEY_PASSWORD       -> contraseña de la clave (suele ser la misma)
    #   ANDROID_KEY_ALIAS          -> alias de la clave
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generar la carpeta android/
        run: |
          flutter create --project-name senss --org com.senss --platforms=android _scaffold
          mv _scaffold/android ./android
          rm -rf _scaffold

      - name: Inyectar permisos de micrófono y cámara
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          grep -q "android.permission.RECORD_AUDIO" "$MANIFEST" || \
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.CAMERA"/>' "$MANIFEST"

      - name: Ajustes de Gradle (JVM target + compileSdk)
        run: |
          # 1) Plugins con KGP antiguo (Java 1.8 vs Kotlin 17): baja la validación.
          echo "kotlin.jvm.target.validation.mode=warning" >> android/gradle.properties
          # 2) compileSdk >= 36 (lo exige flutter_plugin_android_lifecycle).
          #    a) módulo app: se fija directo (evaluado desde el inicio).
          APP_GRADLE=$(ls android/app/build.gradle android/app/build.gradle.kts 2>/dev/null | head -1)
          sed -i -E 's/compileSdk(Version)?[[:space:]]*=?[[:space:]]*[A-Za-z0-9_.]+/compileSdk = 36/' "$APP_GRADLE"
          #    b) módulos de plugins (file_picker, etc.): se compilan aparte, se
          #       fuerzan desde el build raíz con afterEvaluate (Groovy o Kotlin).
          if [ -f android/build.gradle ]; then
            cat ci/compileSdk-override.gradle >> android/build.gradle
          elif [ -f android/build.gradle.kts ]; then
            cat ci/compileSdk-override.gradle.kts >> android/build.gradle.kts
          fi
          echo "--- compileSdk en $APP_GRADLE ---"
          grep -nE 'compileSdk' "$APP_GRADLE" || true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Decodificar keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.jks"

      # --- APK (para instalar directamente / sideload) ---
      # Gradle firma el "release" con la clave debug por defecto; la sustituimos
      # después con apksigner, sin tocar los ficheros Gradle (Groovy o Kotlin).
      - name: Construir APK (release)
        run: flutter build apk --release

      - name: Firmar el APK con apksigner
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          APK=build/app/outputs/flutter-apk/app-release.apk
          # Quita la firma debug (v1) que Gradle aplicó por defecto.
          zip -q -d "$APK" 'META-INF/*.RSA' 'META-INF/*.SF' 'META-INF/*.MF' || true

          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          echo "Usando build-tools: $BT"

          "$BT/zipalign" -f 4 "$APK" "$RUNNER_TEMP/app-aligned.apk"
          "$BT/apksigner" sign \
            --ks "$RUNNER_TEMP/release.jks" \
            --ks-pass "pass:$KS_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --ks-key-alias "$KEY_ALIAS" \
            --out app-release-signed.apk \
            "$RUNNER_TEMP/app-aligned.apk"

          "$BT/apksigner" verify --verbose app-release-signed.apk

      - name: Publicar APK release firmado
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-apk
          path: app-release-signed.apk
          if-no-files-found: warn

      # --- App Bundle (.aab, para subir a Google Play) ---
      # El .aab se firma con jarsigner (firma JAR/v1) con la clave de subida;
      # apksigner no admite bundles. Google Play re-firma con su clave de app.
      - name: Construir App Bundle (release)
        run: flutter build appbundle --release

      - name: Firmar el App Bundle con jarsigner
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          AAB=build/app/outputs/bundle/release/app-release.aab
          # Quita la firma debug (v1) que Gradle aplicó por defecto.
          zip -q -d "$AAB" 'META-INF/*.RSA' 'META-INF/*.SF' 'META-INF/*.MF' || true

          jarsigner -keystore "$RUNNER_TEMP/release.jks" \
            -storepass "$KS_PASS" -keypass "$KEY_PASS" \
            -signedjar app-release-signed.aab \
            "$AAB" "$KEY_ALIAS"

          jarsigner -verify app-release-signed.aab

      - name: Publicar App Bundle firmado
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-aab
          path: app-release-signed.aab
          if-no-files-found: warn

      # Verifica que el .aab es válido y genera un APK instalable (modo
      # universal). bundletool no viene en el runner: se descarga del release.
      - name: Verificar el App Bundle con bundletool
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          BT_VERSION=1.17.0
          curl -sSL -o "$RUNNER_TEMP/bundletool.jar" \
            "https://github.com/google/bundletool/releases/download/${BT_VERSION}/bundletool-all-${BT_VERSION}.jar"

          java -jar "$RUNNER_TEMP/bundletool.jar" build-apks \
            --bundle=app-release-signed.aab \
            --output="$RUNNER_TEMP/universal.apks" \
            --mode=universal \
            --overwrite \
            --ks="$RUNNER_TEMP/release.jks" \
            --ks-pass="pass:$KS_PASS" \
            --ks-key-alias="$KEY_ALIAS" \
            --key-pass="pass:$KEY_PASS"

          # El .apks es un zip; en modo universal contiene universal.apk.
          unzip -o "$RUNNER_TEMP/universal.apks" -d "$RUNNER_TEMP/apks"
          test -f "$RUNNER_TEMP/apks/universal.apk"
          cp "$RUNNER_TEMP/apks/universal.apk" app-release-universal.apk
          echo "OK: el .aab es válido y genera un APK universal instalable."

      - name: Publicar APK universal (verificación)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-universal-apk
          path: app-release-universal.apk
          if-no-files-found: warn
